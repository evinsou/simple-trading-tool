function buildTableData() {
  const rows = [];

  productShops.forEach(ps => {
    const product = products.find(p => p.id === ps.product_id);
    const shop = shops.find(s => s.id === ps.shop_id);
    const system = systems.find(sys => sys.id === shop.system_id);
    const category = categories.find(c => c.id === product.category_id);

	//  FILTER LOGIC
	if (activeSystems.size > 0 && !activeSystems.has(system.id)) return;
	if (activeProducts.size > 0 && !activeProducts.has(product.id)) return;

    rows.push([
      system.name,
      shop.name,
      product.name,
      category.name,
      category.size,
      ps.price,
      category.size * ps.price
    ]);
  });

  return rows;
}

const headers = [
  { title: "System" },
  { title: "Shop" },
  { title: "Product" },
  { title: "Category" },
  { title: "Unit Size" },
  { title: "Price" },
  { title: "Total" }  
];

function reloadTable() {
  const rows = buildTableData();

  if ($.fn.dataTable.isDataTable('#dataTable')) {
    $('#dataTable').DataTable().destroy();
    $('#dataTable').empty();
  }

  $('#dataTable').DataTable({
    data: rows,
    columns: headers,
    paging: false
  });
}


function renderFilters() {
  // Systems
  const sysContainer = document.getElementById("systemFilters");
  sysContainer.innerHTML = "";

  systems.forEach(s => {
    const el = document.createElement("label");
    el.innerHTML = `
      <input type="checkbox" value="${s.id}" onchange="toggleSystem(${s.id})">
      ${s.name}
    `;
    sysContainer.appendChild(el);
  });

  // Products
  const prodContainer = document.getElementById("productFilters");
  prodContainer.innerHTML = "";

  products.forEach(p => {
    const el = document.createElement("label");
    el.innerHTML = `
      <input type="checkbox" value="${p.id}" onchange="toggleProduct(${p.id})">
      ${p.name}
    `;
    prodContainer.appendChild(el);
  });
}
function toggleSystem(id) {
  if (activeSystems.has(id)) {
    activeSystems.delete(id);
  } else {
    activeSystems.add(id);
  }
  reloadTable();
}

function toggleProduct(id) {
  if (activeProducts.has(id)) {
    activeProducts.delete(id);
  } else {
    activeProducts.add(id);
  }
  reloadTable();
}

function resetSystems() {
  activeSystems.clear();
  document.querySelectorAll("#systemFilters input").forEach(i => i.checked = false);
  reloadTable();
}

function resetProducts() {
  activeProducts.clear();
  document.querySelectorAll("#productFilters input").forEach(i => i.checked = false);
  reloadTable();
}

window.onload = function() {
  renderFilters();
  reloadTable();
};
